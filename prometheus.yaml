global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "ml-api"
    static_configs:
      - targets: ["api-service:8000"]
    metrics_path: /metrics
  
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]